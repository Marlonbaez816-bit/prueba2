<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7C3AED" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Aura</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/themes.css" />
</head>
<body class="theme-default" data-page="splash">

  <!-- SPLASH SCREEN -->
  <div id="splash-screen" class="splash">
    <div class="splash__logo">
      <div class="splash__orb"></div>
      <span class="splash__wordmark">Aura</span>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app" class="app hidden">

    <!-- TOP BAR -->
    <header id="top-bar" class="top-bar">
      <div class="top-bar__left">
        <button class="icon-btn" id="btn-logo">
          <span class="aura-logo-sm">✦</span>
        </button>
      </div>
      <div class="top-bar__center">
        <span class="top-bar__title" id="page-title">Inicio</span>
      </div>
      <div class="top-bar__right">
        <button class="icon-btn" id="btn-search" aria-label="Buscar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="icon-btn" id="btn-notifications" aria-label="Notificaciones">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="badge" id="notif-badge">3</span>
        </button>
      </div>
    </header>

    <!-- MAIN CONTENT AREA -->
    <main id="main-content" class="main-content">
      <!-- Pages are injected here by the router -->
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav id="bottom-nav" class="bottom-nav">
      <button class="nav-item active" data-page="home" aria-label="Inicio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Inicio</span>
      </button>
      <button class="nav-item" data-page="ecos" aria-label="Ecos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <span>Ecos</span>
      </button>
      <button class="nav-item nav-item--create" data-action="create" aria-label="Crear">
        <div class="create-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
      </button>
      <button class="nav-item" data-page="communities" aria-label="Comunidades">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Red</span>
      </button>
      <button class="nav-item" data-page="profile" aria-label="Perfil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Perfil</span>
      </button>
    </nav>

    <!-- AURA AI ASSISTANT BUTTON (movable) -->
    <div id="aura-ai-btn" class="aura-ai" draggable="true" title="Asistente Aura IA">
      <div class="aura-ai__orb">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </div>
    </div>

    <!-- MODALS CONTAINER -->
    <div id="modals" class="modals-container"></div>

    <!-- TOAST CONTAINER -->
    <div id="toasts" class="toasts-container" aria-live="polite"></div>

  </div>

  <!-- SCRIPTS — order matters -->
  <script src="js/modules/config.js"></script>
  <script src="js/modules/store.js"></script>
  <script src="js/modules/theme.js"></script>
  <script src="js/modules/router.js"></script>
  <script src="js/modules/toast.js"></script>
  <script src="js/modules/modal.js"></script>
  <script src="js/modules/ai-assistant.js"></script>
  <script src="js/modules/attention.js"></script>
  <script src="js/modules/gyroscope.js"></script>
  <script src="js/modules/auth.js"></script>
  <script src="js/modules/feed.js"></script>
  <script src="js/modules/ecos.js"></script>
  <script src="js/modules/chat.js"></script>
  <script src="js/modules/communities.js"></script>
  <script src="js/modules/profile.js"></script>
  <script src="js/modules/karma.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
