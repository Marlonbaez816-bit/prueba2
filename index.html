<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7C3AED" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Aura" />
  <meta name="description" content="Aura — Tu espacio. Tu aura." />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- PWA / Iconos -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />

  <!-- Open Graph -->
  <meta property="og:title" content="Aura" />
  <meta property="og:description" content="Tu espacio. Tu aura." />
  <meta property="og:type" content="website" />

  <title>Aura ✦</title>

  <!-- CSS Módulos -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/splash.css" />
  <link rel="stylesheet" href="css/camera.css" />
  <link rel="stylesheet" href="css/pwa.css" />
  <link rel="stylesheet" href="css/peek.css" />

  <!-- Face API -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body class="theme-default">

  <!-- SPLASH -->
  <div id="splash-screen" class="splash">
    <div class="splash__bg"></div>
    <div class="splash__particles" id="splash-particles"></div>
    <div class="splash__orb-wrap">
      <div class="splash__ring"></div>
      <div class="splash__ring"></div>
      <div class="splash__ring"></div>
      <div class="splash__orb">✦</div>
    </div>
    <div class="splash__word">Aura</div>
    <div class="splash__tag">Tu espacio · Tu aura</div>
    <div class="splash__bar-wrap"><div class="splash__bar"></div></div>
  </div>

  <!-- APP -->
  <div id="app" class="app hidden">

    <!-- TOP BAR -->
    <header id="top-bar" class="top-bar">
      <div class="top-bar__left">
        <button class="icon-btn" id="btn-logo" aria-label="Inicio">
          <span class="aura-logo-sm">✦</span>
        </button>
      </div>
      <div class="top-bar__center">
        <span class="top-bar__title" id="page-title">Inicio</span>
      </div>
      <div class="top-bar__right">
        <button class="icon-btn" id="btn-camera" aria-label="Cámara">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-search" aria-label="Buscar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-notifications" aria-label="Notificaciones">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="badge" id="notif-badge">3</span>
        </button>
      </div>
    </header>

    <!-- CONTENIDO -->
    <main id="main-content" class="main-content"></main>

    <!-- BOTTOM NAV -->
    <nav id="bottom-nav" class="bottom-nav">
      <button class="nav-item active" data-page="home" aria-label="Inicio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Inicio</span>
      </button>
      <button class="nav-item" data-page="ecos" aria-label="Ecos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2"/>
        </svg>
        <span>Ecos</span>
      </button>
      <button class="nav-item nav-item--create" data-action="create" aria-label="Crear">
        <div class="create-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </div>
      </button>
      <button class="nav-item" data-page="communities" aria-label="Red">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Red</span>
      </button>
      <button class="nav-item" data-page="profile" aria-label="Perfil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Perfil</span>
      </button>
    </nav>

    <!-- BOTÓN IA -->
    <div id="aura-ai-btn" class="aura-ai" title="Asistente Aura IA">
      <div class="aura-ai__wave"></div>
      <div class="aura-ai__wave"></div>
      <div class="aura-ai__orb" id="ai-orb">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
    </div>

    <!-- MODALES -->
    <div id="modals" class="modals-container"></div>

    <!-- TOASTS -->
    <div id="toasts" class="toasts-container" aria-live="polite"></div>

    <!-- BANNER PWA -->
    <div id="install-banner" class="install-banner hidden">
      <div class="install-banner__icon">✦</div>
      <div class="install-banner__text">
        <div class="install-banner__title">Instalar Aura</div>
        <div class="install-banner__sub">Agrégala a tu pantalla de inicio</div>
      </div>
      <button class="install-banner__btn" id="install-btn">Instalar</button>
      <span class="install-banner__close" id="install-close">✕</span>
    </div>

  </div>

  <!-- SVG FAVICON -->
  <svg id="favicon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="display:none">
    <defs>
      <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7c3aed"/>
        <stop offset="100%" stop-color="#ec4899"/>
      </linearGradient>
    </defs>
    <circle cx="16" cy="16" r="16" fill="url(#g)"/>
    <text x="16" y="22" text-anchor="middle" font-size="18" fill="white" font-family="Arial">✦</text>
  </svg>

  <!-- SCRIPTS -->
<script src="js/modules/supabase.js"></script>
<script src="js/modules/auth.js"></script>
  <script src="js/modules/config.js"></script>
  <script src="js/modules/store.js"></script>
  <script src="js/modules/theme.js"></script>
  <script src="js/modules/router.js"></script>
  <script src="js/modules/toast.js"></script>
  <script src="js/modules/modal.js"></script>
  <script src="js/modules/gyroscope.js"></script>
  <script src="js/modules/attention.js"></script>
  <script src="js/modules/ai-assistant.js"></script>
  <script src="js/modules/feed.js"></script>
  <script src="js/modules/ecos.js"></script>
  <script src="js/modules/chat.js"></script>
  <script src="js/modules/communities.js"></script>
  <script src="js/modules/profile.js"></script>
  <script src="js/modules/karma.js"></script>
  <script src="js/modules/notifications.js"></script>
  <script src="js/modules/media.js"></script>
  <script src="js/modules/search.js"></script>
  <script src="js/modules/create-eco.js"></script>
  <script src="js/modules/camera.js"></script>
  <script src="js/modules/splash.js"></script>
  <script src="js/modules/pwa.js"></script>
  <script src="js/modules/peek.js"></script>
<script src="js/modules/user-profile.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
